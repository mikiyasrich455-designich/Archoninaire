<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archon // Lifetime Volume Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-8">
    <div class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold">Lifetime Volume Auditor</h1>
        <input id="addressInput" type="text" placeholder="Paste Solana address..." class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-700">
        <button id="inspectBtn" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Audit Lifetime Volume</button>
        <div id="statusAlert" class="text-blue-400 font-mono hidden">Processing...</div>
        <div id="results" class="hidden space-y-4">
            <h2 id="totalValue" class="text-4xl font-mono text-emerald-400">$0.00</h2>
            <div id="log" class="text-xs font-mono space-y-2"></div>
        </div>
    </div>

    <script>
        const KEY = "cb5a91ff-8dd6-4b7e-90a2-602edcdfd770";
        const RPC = `https://mainnet.helius-rpc.com/?api-key=${KEY}`;

        async function fetchRpc(method, params) {
            const res = await fetch(RPC, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({jsonrpc: '2.0', id: 1, method, params})
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.result;
        }

        document.getElementById('inspectBtn').addEventListener('click', async () => {
            const addr = document.getElementById('addressInput').value.trim();
            const logDiv = document.getElementById('log');
            const status = document.getElementById('statusAlert');
            
            status.classList.remove('hidden');
            logDiv.innerHTML = '';

            try {
                // 1. Get History Signatures
                const sigs = await fetchRpc('getSignaturesForAddress', [addr, {limit: 20}]);
                let totalUsd = 0;

                // 2. Process Transactions Individually
                for (let s of sigs) {
                    const tx = await fetchRpc('getTransaction', [s.signature, {encoding: 'json', maxSupportedTransactionVersion: 0}]);
                    if (!tx || !tx.meta) continue;

                    let txNet = 0;
                    const idx = tx.transaction.message.accountKeys.indexOf(addr);
                    if (idx === -1) continue;

                    // SOL Delta
                    const solDelta = Math.abs((tx.meta.postBalances[idx] || 0) - (tx.meta.preBalances[idx] || 0)) / 1e9;
                    txNet += (solDelta * 145); // Using fallback price

                    // Token Delta
                    const pre = (tx.meta.preTokenBalances || []).filter(b => b.accountIndex === idx);
                    const post = (tx.meta.postTokenBalances || []).filter(b => b.accountIndex === idx);
                    
                    for (let p of post) {
                        const preBal = pre.find(b => b.mint === p.mint)?.uiTokenAmount.uiAmount || 0;
                        txNet += Math.abs((p.uiTokenAmount.uiAmount || 0) - preBal); 
                    }

                    totalUsd += txNet;
                    logDiv.innerHTML += `<div class="p-2 bg-zinc-900 rounded">Tx ${s.signature.slice(0,6)}... Volume: $${txNet.toFixed(2)}</div>`;
                }

                document.getElementById('totalValue').innerText = `$${totalUsd.toFixed(2)}`;
                document.getElementById('results').classList.remove('hidden');
            } catch (e) {
                alert("Audit Error: " + e.message);
            } finally {
                status.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
